name: Update aniparser package

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.3.3). Leave empty to use latest."
        required: false
        type: string

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@v16

      - name: Update default.nix and push
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          if [ -n "$INPUT_TAG" ]; then
            latest_tag="$INPUT_TAG"
          else
            latest_tag=$(curl -s https://api.github.com/repos/sinedka/aniparser/releases/latest \
            | grep '"tag_name":' \
            | sed -E 's/.*"([^"]+)".*/\1/')
          fi

          if [ -z "$latest_tag" ]; then
            echo "Failed to resolve release tag" >&2
            exit 1
          fi

          sed -i "s|releases/download/[^/]*/dist-full.tar.gz|releases/download/${latest_tag}/dist-full.tar.gz|" default.nix
          
          wget https://github.com/Sinedka/aniparser/releases/download/$latest_tag/dist-full.tar.gz

          HASH=$(openssl dgst -sha256 -binary dist-full.tar.gz | openssl base64 -A)

          sed -i "s|sha256 = \".*\";|sha256 = \"sha256-$HASH\";|" default.nix

          rm -f dist-full.tar.gz

          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add default.nix
          git commit -m "Update aniparser to ${latest_tag}"
          git push
          
